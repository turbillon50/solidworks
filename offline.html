<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#004277">
  <title>Innovax BOM Validator Pro - Offline</title>
  <link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.webmanifest">
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: #f3f4f6;
      color: #191c1e;
      font-family: Inter, system-ui, sans-serif;
      padding: 24px;
    }
    main {
      width: min(520px, 100%);
      border: 1px solid #c1c7d2;
      background: #fff;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, .12);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.1;
      text-transform: uppercase;
    }
    p {
      margin: 0 0 18px;
      color: #50616c;
      line-height: 1.5;
    }
    a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 14px;
      background: #004277;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Offline Mode</h1>
    <p>The Innovax BOM Validator Pro demo is installed and ready. Reopen the dashboard or reconnect to refresh live assets.</p>
    <a href="/">Open Dashboard</a>
  </main>
</body>
</html>
